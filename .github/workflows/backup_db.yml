name: Backup DB

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *" # Tous les jours à 2h du matin

env:
  POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
  POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
  POSTGRES_DB: ${{ secrets.POSTGRES_DB }}

jobs:
  backup:
    name: Backup PostgreSQL on VPS
    runs-on: ubuntu-latest

    steps:
      # ----------------------------
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Créer dossier local pour backup
        run: mkdir -p ./backups

      # ----------------------------
      - name: Backup via SSH sur VPS
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/deploy/GreenAIT
            export POSTGRES_USER=${{ env.POSTGRES_USER }}
            export POSTGRES_PASSWORD=${{ env.POSTGRES_PASSWORD }}
            export POSTGRES_DB=${{ env.POSTGRES_DB }}
            ./scripts/backup_db.sh

      # ----------------------------
      - name: Télécharger le backup depuis le VPS
        run: |
          mkdir -p ./backups
          echo "${{ secrets.VPS_SSH_KEY }}" > key.pem
          chmod 600 key.pem

          scp -i key.pem -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/deploy/GreenAIT/backups/latest.sql.gz ./backups/latest.sql.gz

          if [ ! -s ./backups/latest.sql.gz ]; then
            echo "Backup vide ou inexistant après download"
            rm -f key.pem
            exit 1
          fi

          rm -f key.pem

      # ----------------------------
      - name: Upload backup vers GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: greenai-db-backup
          path: ./backups/latest.sql.gz
          retention-days: 7
