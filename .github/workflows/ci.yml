name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      docker:
        image: docker:20.10.24
        options: --privileged
        ports:
          - 2375:2375
    env:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: greenai_dev
      REDIS_PASSWORD: devredis

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Set up .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Python dependencies for api-ai, server-simulator and server-training
        run: |
          pip install -r api-ai/requirements.txt
          pip install -r server-simulator/requirements.txt
          pip install -r server-training/requirements.txt

      - name: Install Node dependencies for frontend
        run: |
          cd frontend
          npm ci

      - name: Restore .NET projects
        run: |
          dotnet restore api-collect-metrics/ApiCollectMetrics.csproj
          dotnet restore api-recommendations/ApiRecommendations.csproj

      - name: Build Docker images
        run: |
          docker build -t frontend ./frontend
          docker build -t api-ai ./api-ai
          docker build -t api-collect-metrics ./api-collect-metrics
          docker build -t api-recommendations ./api-recommendations
          docker build -t server-simulator .

      - name: Run basic tests
        run: |
          echo "Démarrage des tests (Python, .NET ou Node)"
