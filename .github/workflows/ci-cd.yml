name: CI/CD Pipeline

on:
  push:
    branches: [main]

permissions:
  contents: read

env:
  ASPNETCORE_ENVIRONMENT: production
  POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
  POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
  POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
  REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
  LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
  GF_SECURITY_ADMIN_USER: ${{ secrets.GF_SECURITY_ADMIN_USER }}
  GF_SECURITY_ADMIN_PASSWORD: ${{ secrets.GF_SECURITY_ADMIN_PASSWORD }}
  SIMULATOR_1_ID: ${{ secrets.SIMULATOR_1_ID }}
  SIMULATOR_2_ID: ${{ secrets.SIMULATOR_2_ID }}
  SIMULATOR_3_ID: ${{ secrets.SIMULATOR_3_ID }}

jobs:

  # ---------------- Tests parallèles ----------------
  tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        job: [python, dotnet, node]

    steps:
      - uses: actions/checkout@v3

      - name: Setup
        run: |
          docker info

      - name: Python
        if: matrix.job == 'python'
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Run Python tests
        if: matrix.job == 'python'
        run: |
          pip install -r api-ai/requirements.txt
          pip install -r server-simulator/requirements.txt
          pip install pytest
          pytest api-ai/tests
          pytest server-simulator/tests

      - name: .NET
        if: matrix.job == 'dotnet'
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Run .NET tests
        if: matrix.job == 'dotnet'
        run: |
          dotnet test api-collect-metrics/ApiCollectMetrics.Tests/ApiCollectMetrics.Tests.csproj
          dotnet test api-recommendations/ApiRecommendations.Tests/ApiRecommendations.Tests.csproj

      - name: Node
        if: matrix.job == 'node'
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Run Node tests
        if: matrix.job == 'node'
        run: |
          cd frontend
          npm ci
          npm test

  # ---------------- Build Docker + Smoke ----------------
  docker-smoke:
    name: Docker Build & Smoke Tests
    needs: tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # --- Checkout repo ---
      - uses: actions/checkout@v3

      # --- Setup Docker Buildx ---
      - uses: docker/setup-buildx-action@v2

      # --- Docker info for debugging ---
      - name: Docker info
        run: docker info

      # --- Build only modified services ---
      - name: Build Docker images for modified services
        run: |
          SERVICES=("greenait-frontend" "greenait-api-ai" "greenait-api-collect-metrics" \
          "greenait-api-recommendations" "greenait-server-simulator-1" \
          "greenait-server-simulator-2" "greenait-server-simulator-3")

          MODIFIED=()
          for S in "${SERVICES[@]}"; do
            DIR=${S#greenait-}
            if git diff --name-only HEAD^ HEAD | grep -q "^$DIR"; then
              MODIFIED+=("$S")
            fi
          done

          echo "Modified services: ${MODIFIED[*]}"

          if [ ${#MODIFIED[@]} -ne 0 ]; then
            for S in "${MODIFIED[@]}"; do
              case $S in
                greenait-frontend)
                  docker build -t api-frontend:latest ./frontend
                  ;;
                greenait-api-ai)
                  docker build -t api-ai:latest ./api-ai
                  ;;
                greenait-api-collect-metrics)
                  docker build -t api-collect-metrics:latest ./api-collect-metrics/ApiCollectMetrics
                  ;;
                greenait-api-recommendations)
                  docker build -t api-recommendations:latest ./api-recommendations/ApiRecommendations
                  ;;
                greenait-server-simulator-1|greenait-server-simulator-2|greenait-server-simulator-3)
                  docker build -t server-simulator:latest ./server-simulator
                  ;;
              esac
            done
          else
            echo "No modified services detected. Skipping build."
          fi

      # --- Start smoke test containers ---
      - name: Start smoke test containers
        run: docker compose -f docker-compose.test.yml up -d --wait

      # --- Smoke test APIs ---
      - name: Smoke test APIs
        run: |
          echo "Testing api-collect-metrics..."
          curl -f http://localhost:5002/health
          echo "Testing api-recommendations..."
          curl -f http://localhost:5003/health
          echo "All smoke tests passed ✅"

      # --- Stop smoke test containers ---
      - name: Stop smoke test containers
        run: docker compose -f docker-compose.test.yml down

      # --- Cleanup Docker ---
      - name: Cleanup Docker
        if: always()
        run: docker system prune -af

  # ---------------- Deploy ----------------
  deploy:
    name: Deploy to VPS
    needs: docker-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/deploy/GreenAIT
            export ASPNETCORE_ENVIRONMENT=${{ env.ASPNETCORE_ENVIRONMENT }}
            export POSTGRES_USER=${{ env.POSTGRES_USER }}
            export POSTGRES_PASSWORD=${{ env.POSTGRES_PASSWORD }}
            export POSTGRES_DB=${{ env.POSTGRES_DB }}
            export REDIS_PASSWORD=${{ env.REDIS_PASSWORD }}
            export LETSENCRYPT_EMAIL=${{ env.LETSENCRYPT_EMAIL }}
            export GF_SECURITY_ADMIN_USER=${{ env.GF_SECURITY_ADMIN_USER }}
            export GF_SECURITY_ADMIN_PASSWORD=${{ env.GF_SECURITY_ADMIN_PASSWORD }}
            export SIMULATOR_1_ID=${{ env.SIMULATOR_1_ID }}
            export SIMULATOR_2_ID=${{ env.SIMULATOR_2_ID }}
            export SIMULATOR_3_ID=${{ env.SIMULATOR_3_ID }}
            ./scripts/deploy.sh
