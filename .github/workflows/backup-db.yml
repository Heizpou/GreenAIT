name: Backup DB

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *" # Tous les jours à 2h du matin

env:
  ASPNETCORE_ENVIRONMENT: production
  POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
  POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
  POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
  REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
  LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
  GF_SECURITY_ADMIN_USER: ${{ secrets.GF_SECURITY_ADMIN_USER }}
  GF_SECURITY_ADMIN_PASSWORD: ${{ secrets.GF_SECURITY_ADMIN_PASSWORD }}
  SIMULATOR_1_ID: ${{ secrets.SIMULATOR_1_ID }}
  SIMULATOR_2_ID: ${{ secrets.SIMULATOR_2_ID }}
  SIMULATOR_3_ID: ${{ secrets.SIMULATOR_3_ID }}

jobs:
  backup:
    name: Backup PostgreSQL on VPS
    runs-on: ubuntu-latest

    steps:
      # ----------------------------
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Créer dossier local pour backup
        run: mkdir -p ./backups

      # ----------------------------
      - name: Backup via SSH sur VPS
        uses: appleboy/ssh-action@v0.1.6
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          ASPNETCORE_ENVIRONMENT: ${{ env.ASPNETCORE_ENVIRONMENT }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
          GF_SECURITY_ADMIN_USER: ${{ secrets.GF_SECURITY_ADMIN_USER }}
          GF_SECURITY_ADMIN_PASSWORD: ${{ secrets.GF_SECURITY_ADMIN_PASSWORD }}
          SIMULATOR_1_ID: ${{ secrets.SIMULATOR_1_ID }}
          SIMULATOR_2_ID: ${{ secrets.SIMULATOR_2_ID }}
          SIMULATOR_3_ID: ${{ secrets.SIMULATOR_3_ID }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/deploy/GreenAIT
            # Exécute le script backup_db.sh
            ./scripts/backup_db.sh

      # ----------------------------
      - name: Télécharger le backup depuis le VPS
        run: |
          mkdir -p ./backups
          echo "${{ secrets.VPS_SSH_KEY }}" > key.pem
          chmod 600 key.pem

          scp -i key.pem ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/deploy/GreenAIT/backups/latest.sql.gz ./backups/latest.sql.gz

          # Vérifie que le backup téléchargé n’est pas vide
          if [ ! -s ./backups/latest.sql.gz ]; then
            echo "Backup vide ou inexistant après download"
            rm -f key.pem
            exit 1
          fi

          # Supprimer la clé temporaire
          rm -f key.pem

      # ----------------------------
      - name: Upload backup vers GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: greenai-db-backup
          path: ./backups/latest.sql.gz
          retention-days: 7
