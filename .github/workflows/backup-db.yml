name: Backup DB

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *" # Exécution tous les jours à 2h du matin

jobs:
  backup:
    name: Backup PostgreSQL on VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      # Étape 1 : Backup sur le VPS via SSH
      - name: Backup via SSH
        uses: appleboy/ssh-action@v0.1.6
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB
          script: |
            cd /home/deploy/GreenAIT
            mkdir -p backups
            ./scripts/backup_db.sh

      # Étape 2 : Récupérer le backup depuis le VPS
      - name: Download backup from VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "/home/deploy/GreenAIT/backups/*.sql.gz"
          target: "./backups"

      # Étape 3 : Upload vers GitHub Actions
      - name: Upload backup to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: greenai-db-backup
          path: ./backups/*.sql.gz
          retention-days: 7
