services:
  # ---------------- PostgreSQL ----------------
  postgres:
    image: postgres:15-alpine
    container_name: test-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dev
    volumes:
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dev -h localhost || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  # ---------------- Redis ----------------
  redis:
    image: redis:7-alpine
    container_name: test-redis
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"

  # ---------------- API AI ----------------
  api-ai:
    build:
      context: ./api-ai
      dockerfile: Dockerfile
    container_name: test-api-ai
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------- API Collect Metrics ----------------
  api-collect-metrics:
    build:
      context: .
      dockerfile: api-collect-metrics/ApiCollectMetrics/Dockerfile
    container_name: test-api-collect-metrics
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:80
      ASPNETCORE_ENVIRONMENT: Production
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: dev
      DB_HOST: postgres
    ports:
      - "5002:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------- API Recommendations ----------------
  api-recommendations:
    build:
      context: .
      dockerfile: api-recommendations/ApiRecommendations/Dockerfile
    container_name: test-api-recommendations
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:80
      ASPNETCORE_ENVIRONMENT: Production
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: dev
      DB_HOST: postgres
    ports:
      - "5003:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------- Server Simulators ----------------
  server-simulator-1:
    build:
      context: .
      dockerfile: server-simulator/Dockerfile
    container_name: test-server-simulator-1
    depends_on:
      api-collect-metrics:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      METRICS_API_URL: "http://test-api-collect-metrics/api/metrics"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  server-simulator-2:
    build:
      context: .
      dockerfile: server-simulator/Dockerfile
    container_name: test-server-simulator-2
    depends_on:
      api-collect-metrics:
        condition: service_healthy
    ports:
      - "8082:8080"
    environment:
      METRICS_API_URL: "http://test-api-collect-metrics/api/metrics"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
