services:

  frontend:
    container_name: frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"

  api-ai:
    container_name: api-ai
    build:
      context: ./api-ai
      dockerfile: Dockerfile
    ports:
      - "5001:5000"

  api-collect-metrics:
    container_name: api-collect-metrics
    build:
      context: .
      dockerfile: api-collect-metrics/ApiCollectMetrics/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5002:80"
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:80
      ASPNETCORE_ENVIRONMENT: Development
      DB_USER: dev
      DB_PASSWORD: dev
      DB_NAME: greenai_dev
      DB_HOST: postgres

  api-recommendations:
    container_name: api-recommendations
    build:
      context: .
      dockerfile: api-recommendations/ApiRecommendations/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5003:80"
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:80
      ASPNETCORE_ENVIRONMENT: Development
      DB_USER: dev
      DB_PASSWORD: dev
      DB_NAME: greenai_dev
      DB_HOST: postgres

  server-simulator-1:
    container_name: server-simulator-1
    build:
      context: .
      dockerfile: server-simulator/Dockerfile
    depends_on:
      - api-collect-metrics
    ports:
      - "8081:8080"
    environment:
      SERVER_ID: "srv1"
      METRICS_API_URL: "http://api-collect-metrics/api/metrics"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  server-simulator-2:
    container_name: server-simulator-2
    build:
      context: .
      dockerfile: server-simulator/Dockerfile
    depends_on:
      - api-collect-metrics
    ports:
      - "8082:8080"
    environment:
      SERVER_ID: "srv2"
      METRICS_API_URL: "http://api-collect-metrics/api/metrics"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: greenai_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d greenai_dev -h localhost || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
