services:
  # ---------------- Traefik ----------------
  traefik:
    image: traefik:v3.1
    container_name: traefik
    command:
      - "--api.dashboard=true"
      - "--api.insecure=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--certificatesresolvers.le.acme.httpchallenge=true"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.le.acme.email=${LETSENCRYPT_EMAIL}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
    networks:
      - traefik-public
      - frontend-net
      - recommendations-net
      - metrics-net
      - monitoring-net

  # ---------------- Frontend ----------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: greenait-frontend:latest
    container_name: greenait-frontend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`heizpou.com`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=le"
      - "traefik.http.routers.frontend-http.rule=Host(`heizpou.com`)"
      - "traefik.http.routers.frontend-http.entrypoints=web"
      - "traefik.http.routers.frontend-http.middlewares=https-redirect"
      - "traefik.http.middlewares.https-redirect.redirectscheme.scheme=https"
    networks:
      - frontend-net
      - recommendations-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost"]
      interval: 10s
      retries: 5

  # ---------------- API AI ----------------
  api-ai:
    build:
      context: ./api-ai
      dockerfile: Dockerfile
    image: greenait-api-ai:latest
    container_name: greenait-api-ai
    networks:
      - ai-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:5000/health || exit 1"]
      interval: 15s
      retries: 5

  # ---------------- API Collect Metrics ----------------
  api-collect-metrics:
    build:
      context: .
      dockerfile: api-collect-metrics/ApiCollectMetrics/Dockerfile
    image: greenait-api-collect-metrics:latest
    container_name: greenait-api-collect-metrics
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:80
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_HOST: greenait-postgres
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api-metrics.rule=Host(`metrics.heizpou.com`)"
      - "traefik.http.routers.api-metrics.entrypoints=websecure"
      - "traefik.http.routers.api-metrics.tls.certresolver=le"
      - "traefik.http.services.api-metrics.loadbalancer.server.port=80"
      - "traefik.docker.network=greenait-metrics-net"
    networks:
      - metrics-net
      - db-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
      interval: 10s
      retries: 5

  # ---------------- API Recommendations ----------------
  api-recommendations:
    build:
      context: .
      dockerfile: api-recommendations/ApiRecommendations/Dockerfile
    image: greenait-api-recommendations:latest
    container_name: greenait-api-recommendations
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:80
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_HOST: greenait-postgres
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api-recommendations.rule=Host(`recommendations.heizpou.com`)"
      - "traefik.http.routers.api-recommendations.entrypoints=websecure"
      - "traefik.http.routers.api-recommendations.tls.certresolver=le"
      - "traefik.http.services.api-recommendations.loadbalancer.server.port=80"
      - "traefik.docker.network=greenait-recommendations-net"
    networks:
      - recommendations-net
      - cache-net
      - db-net
      - ai-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
      interval: 10s
      retries: 5

  # ---------------- Server Simulators ----------------
  server-simulator-1:
    build:
      context: .
      dockerfile: server-simulator/Dockerfile
    image: greenait-server-simulator-1:latest
    container_name: greenait-server-simulator-1
    depends_on:
      - api-collect-metrics
    environment:
      SERVER_ID: ${SIMULATOR_1_ID}
      METRICS_API_URL: "http://greenait-api-collect-metrics/api/metrics"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sim-1.rule=Host(`sim1.heizpou.com`)"
      - "traefik.http.routers.sim-1.entrypoints=websecure"
      - "traefik.http.routers.sim-1.tls.certresolver=le"
      - "traefik.http.services.sim-1.loadbalancer.server.port=8080"
      - "traefik.docker.network=greenait-metrics-net"
    networks:
      - traefik-public
      - metrics-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  server-simulator-2:
    build:
      context: .
      dockerfile: server-simulator/Dockerfile
    image: greenait-server-simulator-2:latest
    container_name: greenait-server-simulator-2
    depends_on:
      - api-collect-metrics
    environment:
      SERVER_ID: ${SIMULATOR_2_ID}
      METRICS_API_URL: "http://greenait-api-collect-metrics/api/metrics"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sim-2.rule=Host(`sim2.heizpou.com`)"
      - "traefik.http.routers.sim-2.entrypoints=websecure"
      - "traefik.http.routers.sim-2.tls.certresolver=le"
      - "traefik.http.services.sim-2.loadbalancer.server.port=8080"
      - "traefik.docker.network=greenait-metrics-net"
    networks:
      - traefik-public
      - metrics-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  server-simulator-3:
    build:
      context: .
      dockerfile: server-simulator/Dockerfile
    image: greenait-server-simulator-3:latest
    container_name: greenait-server-simulator-3
    depends_on:
      - api-collect-metrics
    environment:
      SERVER_ID: ${SIMULATOR_3_ID}
      METRICS_API_URL: "http://greenait-api-collect-metrics/api/metrics"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sim-3.rule=Host(`sim3.heizpou.com`)"
      - "traefik.http.routers.sim-3.entrypoints=websecure"
      - "traefik.http.routers.sim-3.tls.certresolver=le"
      - "traefik.http.services.sim-3.loadbalancer.server.port=8080"
      - "traefik.docker.network=greenait-metrics-net"
    networks:
      - traefik-public
      - metrics-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------------- PostgreSQL ----------------
  greenait-postgres:
    image: postgres:15-alpine
    container_name: greenait-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - db-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      retries: 5

  # ---------------- Redis ----------------
  redis:
    image: redis:7-alpine
    container_name: greenait-redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    networks:
      - cache-net
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      retries: 5

  # ---------------- Prometheus ----------------
  prometheus:
    image: prom/prometheus
    container_name: greenait-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - monitoring-net
      - metrics-net
      - recommendations-net

  # ---------------- Grafana ----------------
  grafana:
    image: grafana/grafana
    container_name: greenait-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_SERVER_HTTP_PORT: 3000
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - monitoring-net
    depends_on:
      - prometheus
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.heizpou.com`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=le"
      - "traefik.http.routers.grafana.middlewares=grafana-auth"
      - "traefik.http.middlewares.grafana-auth.basicauth.users=Heizpou:$$apr1$$zrQaWquA$$YNifqD/fiqczGgXLqcf0E."

volumes:
  postgres-data:
  grafana-data:

networks:
  traefik-public:
    external: true
  frontend-net:
    name: greenait-frontend-net
  recommendations-net:
    name: greenait-recommendations-net
  metrics-net:
    name: greenait-metrics-net
  ai-net:
    name: greenait-ai-net
  db-net:
    name: greenait-db-net
  cache-net:
    name: greenait-cache-net
  monitoring-net:
    name: greenait-monitoring-net
