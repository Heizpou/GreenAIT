version: "3.9"

services:

  # Traefik (reverse proxy)
  traefik:
    image: traefik:v2.13
    container_name: traefik
    command:
      - "--api.insecure=${TRAEFIK_API_INSECURE}"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.le.acme.email=${TRAEFIK_EMAIL}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.le.acme.tlschallenge=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
    networks:
      - frontend-net
      - metrics-net

  # Frontend Vue.js
  frontend:
    container_name: frontend
    build:
      context: ./frontend
      dockerfile: frontend/Dockerfile
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`frontend.greenai.com`)"
      - "traefik.http.routers.frontend.entrypoints=web"
    networks:
      - frontend-net
      - recommendations-net

  # API AI RL
  api-ai:
    container_name: api-ai
    build:
      context: ./api-ai
      dockerfile: api-ai/Dockerfile
    networks:
      - ai-net

  # API Collect Metrics
  api-collect-metrics:
    container_name: api-collect-metrics
    build:
      context: ./api-collect-metrics
      dockerfile: api-collect-metrics/Dockerfile
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:80
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_HOST: postgres
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api-collect-metrics.rule=Host(`metrics.greenai.com`)"
      - "traefik.http.routers.api-collect-metrics.entrypoints=web"
    networks:
      - metrics-net
      - db-net

  # API Recommendations
  api-recommendations:
    container_name: api-recommendations
    build:
      context: ./api-recommendations
      dockerfile: api-recommendations/Dockerfile
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:80
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_HOST: postgres
    networks:
      - recommendations-net
      - cache-net
      - db-net
      - ai-net

  # Server Simulators
  server-simulator-1:
    container_name: server-simulator-1
    build:
      context: ./server-simulator
      dockerfile: server-simulator/Dockerfile
    environment:
      SERVER_ID: ${SIMULATOR_1_ID}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - server-net

  server-simulator-2:
    container_name: server-simulator-2
    build:
      context: ./server-simulator
      dockerfile: server-simulator/Dockerfile
    environment:
      SERVER_ID: ${SIMULATOR_2_ID}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - server-net

  server-simulator-3:
    container_name: server-simulator-3
    build:
      context: ./server-simulator
      dockerfile: server-simulator/Dockerfile
    environment:
      SERVER_ID: ${SIMULATOR_3_ID}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - server-net

  # PostgreSQL prod
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - db-net

  # Redis
  redis:
    image: redis:7-alpine
    container_name: redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    networks:
      - cache-net
    restart: always

volumes:
  postgres-data:

networks:
  frontend-net:
    driver: bridge
  metrics-net:
    driver: bridge
  recommendations-net:
    driver: bridge
  ai-net:
    driver: bridge
  cache-net:
    driver: bridge
  db-net:
    driver: bridge
  server-net:
    driver: bridge
