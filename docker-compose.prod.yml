services:

  # Traefik (reverse proxy)
  traefik:
    image: traefik:v3.1
    command:
      - "--api.insecure=${TRAEFIK_API_INSECURE}"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.le.acme.email=${TRAEFIK_EMAIL}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.le.acme.tlschallenge=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
    networks:
      - frontend-net
      - metrics-net
      - monitoring-net

  # Frontend Vue.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`heizpou.com`)"
      - "traefik.http.routers.frontend.entrypoints=web"
    networks:
      - frontend-net
      - recommendations-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost"]
      interval: 10s
      timeout: 3s
      retries: 5

  # API AI RL
  api-ai:
    build:
      context: ./api-ai
      dockerfile: Dockerfile
    networks:
      - ai-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # API Collect Metrics
  api-collect-metrics:
    build:
      context: ./api-collect-metrics/ApiCollectMetrics
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:80
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_HOST: postgres
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api-collect-metrics.rule=Host(`metrics.heizpou.com`)"
      - "traefik.http.routers.api-collect-metrics.entrypoints=web"
    networks:
      - metrics-net
      - db-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  # API Recommendations
  api-recommendations:
    build:
      context: ./api-recommendations/ApiRecommendations
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:80
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_HOST: postgres
    networks:
      - recommendations-net
      - cache-net
      - db-net
      - ai-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Server Simulators
  server-simulator-1:
    build:
      context: .
      dockerfile: server-simulator/Dockerfile
    environment:
      SERVER_ID: ${SIMULATOR_1_ID}
    networks:
      - server-net

  server-simulator-2:
    build:
      context: .
      dockerfile: server-simulator/Dockerfile
    environment:
      SERVER_ID: ${SIMULATOR_2_ID}
    networks:
      - server-net

  server-simulator-3:
    build:
      context: .
      dockerfile: server-simulator/Dockerfile
    environment:
      SERVER_ID: ${SIMULATOR_3_ID}
    networks:
      - server-net

  # PostgreSQL prod
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - db-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    networks:
      - cache-net
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Prometheus
  prometheus:
    image: prom/prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - monitoring-net
      - metrics-net
      - recommendations-net

  # Grafana
  grafana:
    image: grafana/grafana
    environment:
        GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
        GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
        GF_SERVER_HTTP_PORT: 3000
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - monitoring-net
    depends_on:
      - prometheus
    labels:
    - "traefik.enable=true"
    - "traefik.http.routers.grafana.rule=Host(`grafana.heizpou.com`)"
    - "traefik.http.routers.grafana.entrypoints=websecure"
    - "traefik.http.routers.grafana.tls.certresolver=le"
    - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    - "traefik.http.middlewares.grafana-auth.basicauth.users=Heizpou:$$apr1$$zrQaWquA$$YNifqD/fiqczGgXLqcf0E."
    - "traefik.http.routers.grafana.middlewares=grafana-auth"

volumes:
  postgres-data:
  grafana-data:

networks:
  frontend-net:
  monitoring-net:
  metrics-net:
  recommendations-net:
  ai-net:
  cache-net:
  db-net:
  server-net:
